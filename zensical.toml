[project]
site_name = "sdmxflow"
site_description = "SDMX ingestion for data warehouse ETL/ELT: reproducible, append-only artifacts (facts CSV + metadata history + codelist exports) for scheduled refresh workflows."
site_url = "https://knifflig.github.io/sdmxflow/"
site_author = "Henry Zehe"

docs_dir = "docs"
site_dir = "site"

repo_url = "https://github.com/knifflig/sdmxflow"
repo_name = "knifflig/sdmxflow"
edit_uri = "edit/main/docs/"

nav = [
  { "Overview" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Workflows" = [
    { "Concepts & Design" = "concepts-and-design.md" },
    { "Output Artifacts (Contract)" = "output-layout.md" },
    { "Scheduling & Deployment" = "scheduling-and-deployment.md" },
    { "Integration Patterns" = "integration-patterns.md" },
  ] },
  { "Reference" = [
    { "Configuration Reference" = "api.md" },
    { "Logging" = "logging.md" },
    { "Examples" = "examples.md" },
    { "Provider Support" = "provider-support.md" },
    { "FAQ & Troubleshooting" = "faq.md" },
    { "Changelog" = "changelog.md" },
    { "Glossary" = "glossary.md" },
  ] },
  { "Development & Contributing" = "development.md" },
  { "Credits & License" = "credits.md" },
]

[project.theme]
variant = "classic"
features = [
  "content.action.edit",
  "content.action.view",
]

[project.theme.icon]
repo = "fontawesome/brands/github"
