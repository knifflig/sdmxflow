name: Documentation

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/configure-pages@v5

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build site
        run: uv run zensical build --clean

      - name: Fetch previously published site (docs-history)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _previous_site
          mkdir -p _previous_site

          if git ls-remote --exit-code --heads origin docs-history >/dev/null 2>&1; then
            git fetch --depth=1 origin docs-history
            git archive --format=tar FETCH_HEAD | tar -x -C _previous_site
            echo "Found docs-history branch; restored previous site."
          else
            echo "No docs-history branch found yet; continuing with fresh site."
          fi

      - name: Prepare versioned site output
        shell: bash
        run: |
          set -euo pipefail

          # Start from the previously published content (if present) so we can
          # keep older versions around across deployments.
          mkdir -p public
          if [ -d "_previous_site" ]; then
            rsync -a --delete --exclude='.git/' "_previous_site/" "public/"
          fi

          # Publish the current version at the site root, but keep all content
          # under versions/ (older releases).
          rsync -a --delete \
            --exclude='versions/' \
            --exclude='CNAME' \
            --exclude='.nojekyll' \
            "site/" "public/"

          # Also publish this release under versions/<tag>/ (tags only).
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
            mkdir -p "public/versions/${VERSION}/"
            rsync -a --delete "site/" "public/versions/${VERSION}/"
          else
            echo "Not a tag ref; skipping versions/<tag>/ snapshot."
          fi

      - uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - uses: actions/deploy-pages@v4
        id: deployment

      - name: Persist published site to docs-history branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: docs-history
          publish_dir: public
          force_orphan: true
